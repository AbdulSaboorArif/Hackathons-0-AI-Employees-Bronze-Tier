version: '3.8'

services:
  # PostgreSQL Database for Odoo
  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - odoo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Odoo 19 Community Edition
  odoo:
    image: odoo:19
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"  # Longpolling port
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_password
      DB_PORT: 5432
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./odoo/addons:/mnt/extra-addons
    networks:
      - odoo-network
    restart: unless-stopped
    command: --
      --db_host=db
      --db_port=5432
      --db_user=odoo
      --db_password=odoo_password
      --xmlrpc-port=8069
      --longpolling-port=8072

volumes:
  odoo-db-data:
    driver: local
  odoo-web-data:
    driver: local

networks:
  odoo-network:
    driver: bridge
